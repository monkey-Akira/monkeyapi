services:
  new-api:
    image: ghcr.io/monkey-akira/monkeyapi:latest
    container_name: monkeyapi
    restart: always
    command: --log-dir /app/logs
    ports:
      - "${HOST_BIND:-127.0.0.1}:${APP_PORT:-3000}:3000"
    volumes:
      - ./data:/data
      - ./logs:/app/logs
    environment:
      SQL_DSN: "${MYSQL_USER:-root}:${MYSQL_PASSWORD}@tcp(mysql:3306)/${MYSQL_DATABASE:-new-api}?charset=utf8mb4&parseTime=True&loc=Local"
      REDIS_CONN_STRING: "redis://:${REDIS_PASSWORD}@redis:6379"
      TZ: "${TZ:-Asia/Shanghai}"
      ERROR_LOG_ENABLED: "true"
      BATCH_UPDATE_ENABLED: "true"
      NODE_NAME: "${NODE_NAME:-monkeyapi-node-1}"
      PORT: "3000"
      SESSION_SECRET: "${SESSION_SECRET}"
      FRONTEND_BASE_URL: "${FRONTEND_BASE_URL}"
    depends_on:
      mysql:
        condition: service_started
      redis:
        condition: service_healthy
    networks:
      - monkeyapi-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:3000/api/status | grep -o '\"success\":\\s*true' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:7
    container_name: monkeyapi-redis
    restart: always
    command: ["sh", "-c", "redis-server --requirepass \"$${REDIS_PASSWORD}\""]
    environment:
      REDIS_PASSWORD: "${REDIS_PASSWORD}"
    networks:
      - monkeyapi-network
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5

  mysql:
    image: mysql:8.2
    container_name: monkeyapi-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: "${MYSQL_PASSWORD}"
      MYSQL_DATABASE: "${MYSQL_DATABASE:-new-api}"
      TZ: "${TZ:-Asia/Shanghai}"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - monkeyapi-network

volumes:
  mysql_data:

networks:
  monkeyapi-network:
    driver: bridge
