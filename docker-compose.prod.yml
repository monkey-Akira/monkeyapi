services:
  new-api:
    image: ghcr.io/monkey-akira/monkeyapi:latest
    container_name: monkeyapi
    restart: always
    command: --log-dir /app/logs
    ports:
      - "${HOST_BIND:-127.0.0.1}:${APP_PORT:-3006}:3006"
    volumes:
      - ./data:/data
      - ./logs:/app/logs
    environment:
      SQL_DSN: "postgresql://${POSTGRES_USER:-root}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-new-api}"
      REDIS_CONN_STRING: "redis://:${REDIS_PASSWORD}@redis:6379"
      TZ: "${TZ:-Asia/Shanghai}"
      ERROR_LOG_ENABLED: "true"
      BATCH_UPDATE_ENABLED: "true"
      NODE_NAME: "${NODE_NAME:-monkeyapi-node-1}"
      SESSION_SECRET: "${SESSION_SECRET}"
      FRONTEND_BASE_URL: "${FRONTEND_BASE_URL}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - monkeyapi-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:3006/api/status | grep -o '\"success\":\\s*true' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:7
    container_name: monkeyapi-redis
    restart: always
    command: ["sh", "-c", "redis-server --requirepass \"$${REDIS_PASSWORD}\""]
    environment:
      REDIS_PASSWORD: "${REDIS_PASSWORD}"
    networks:
      - monkeyapi-network
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:15
    container_name: monkeyapi-postgres
    restart: always
    environment:
      POSTGRES_USER: "${POSTGRES_USER:-root}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_DB: "${POSTGRES_DB:-new-api}"
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - monkeyapi-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pg_data:

networks:
  monkeyapi-network:
    driver: bridge
